title: Ahhlo
description: The fastest, most private baby logging app.
# Project-page repo, so the site lives under /ahhlo-site.
# If you move to a custom domain later, set baseurl to "" and add a CNAME file.
baseurl: "/ahhlo-site"
url: "https://bean-studio-apps.github.io"

# A theme isn't used — the shared _layouts/default.html owns all markup.
# Keep the build minimal and predictable.
plugins: []
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
